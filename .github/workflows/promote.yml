name: promote
# Manual promotion: dev → staging or staging → prod by image digest.
# This workflow does NOT build images. It only opens a manifest-bump PR
# in the manifest repo for the target env, copying the digest from the
# source env's current kustomization.yaml. Argo CD + Flagger pick it up.
on:
  workflow_dispatch:
    inputs:
      from:
        type: choice
        options: [dev, staging]
        default: dev
      to:
        type: choice
        options: [staging, prod]
        default: staging

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.to }}-promote
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sachincool/ulys-manifests
          token: ${{ secrets.MANIFEST_REPO_PAT }}
      - name: copy digests
        run: |
          API=$(yq    '.images[0].digest' apps/${{ inputs.from }}/kustomization.yaml)
          WORKER=$(yq '.images[1].digest' apps/${{ inputs.from }}/kustomization.yaml)
          yq -i ".images[0].digest = \"$API\""    apps/${{ inputs.to }}/kustomization.yaml
          yq -i ".images[1].digest = \"$WORKER\"" apps/${{ inputs.to }}/kustomization.yaml
      - name: open PR
        env: { GH_TOKEN: "${{ secrets.MANIFEST_REPO_PAT }}" }
        run: |
          BR="promote-${{ inputs.from }}-to-${{ inputs.to }}-$(date +%s)"
          git config user.name "ulys-ci"
          git config user.email ci@ulys.local
          git checkout -b "$BR"
          git add apps/${{ inputs.to }}/kustomization.yaml
          git commit -m "promote ${{ inputs.from }} → ${{ inputs.to }}"
          git push origin "$BR"
          gh pr create \
            --title "promote ${{ inputs.from }} → ${{ inputs.to }}" \
            --body "Same digest, signed by CI. Argo CD reconciles after merge; Flagger handles canary." \
            --base main --head "$BR"
