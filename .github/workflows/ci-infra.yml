name: ci-infra

on:
  pull_request:
    paths: ["infra/**", ".github/workflows/ci-infra.yml"]
  push:
    branches: [main]
    paths: ["infra/**", ".github/workflows/ci-infra.yml"]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.7.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # Opt JS-based actions (checkout, setup-terraform, auth, github-script)
  # into Node 24 ahead of GitHub's forced default on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fmt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive
        working-directory: infra
      - run: terraform init -backend=false
        working-directory: infra/envs/dev
      - run: terraform validate
        working-directory: infra/envs/dev
      - run: terraform init -backend=false
        working-directory: infra/bootstrap
      - run: terraform validate
        working-directory: infra/bootstrap

  plan:
    needs: fmt-validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    defaults: { run: { working-directory: infra/envs/dev } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_DEV }}
          service_account: ${{ vars.DEPLOYER_SA_DEV }}
      - run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_PROJECT_ID_DEV }}-tf-state" \
            -backend-config="prefix=envs/dev"
      - id: plan
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan \
            -var "project=${{ vars.GCP_PROJECT_ID_DEV }}" \
            -var "billing_account=${{ secrets.BILLING_ACCOUNT }}" \
            -var "alert_email=${{ vars.ALERT_EMAIL }}" \
            | tee plan.txt
      - uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('infra/envs/dev/plan.txt', 'utf8');
            const trimmed = body.length > 60000 ? body.slice(0, 60000) + "\n…(truncated)" : body;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body: "### Terraform plan — `envs/dev`\n\n```\n" + trimmed + "\n```",
            });

  apply:
    needs: fmt-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    defaults: { run: { working-directory: infra/envs/dev } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_DEV }}
          service_account: ${{ vars.DEPLOYER_SA_DEV }}
      - run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCP_PROJECT_ID_DEV }}-tf-state" \
            -backend-config="prefix=envs/dev"
      - run: |
          terraform apply -auto-approve \
            -var "project=${{ vars.GCP_PROJECT_ID_DEV }}" \
            -var "billing_account=${{ secrets.BILLING_ACCOUNT }}" \
            -var "alert_email=${{ vars.ALERT_EMAIL }}"
