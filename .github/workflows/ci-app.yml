name: ci-app

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/ci-app.yml"
  pull_request:
    paths: ["apps/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  packages: write
  pull-requests: write

env:
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker]
    defaults:
      run:
        working-directory: apps/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/${{ matrix.service }}/go.sum
      - run: go vet ./...
      - run: go test -race ./...

  build-and-push:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker]
    outputs:
      api-digest:    ${{ steps.dgst.outputs.api }}
      worker-digest: ${{ steps.dgst.outputs.worker }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_DEV }}
          service_account: ${{ vars.DEPLOYER_SA_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: |
          SHA="${GITHUB_SHA::12}"
          IMAGE="${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID_DEV }}/ulys/${{ matrix.service }}:$SHA"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"     >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

      - id: dgst
        run: echo "${{ matrix.service }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  bump-manifest:
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: sachincool/ulys-manifests
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          path: manifests

      - run: |
          cd manifests/apps/dev
          yq -i ".images[0].digest = \"${{ needs.build-and-push.outputs.api-digest }}\"" kustomization.yaml
          yq -i ".images[1].digest = \"${{ needs.build-and-push.outputs.worker-digest }}\"" kustomization.yaml

      - name: open PR
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_REPO_PAT }}
        run: |
          cd manifests
          BR="bump-dev-${GITHUB_SHA::12}"
          git config user.name  "ulys-ci"
          git config user.email "ci@ulys.local"
          git checkout -b "$BR"
          git add apps/dev/kustomization.yaml
          git commit -m "dev: bump api/worker to ${GITHUB_SHA::12}"
          git push origin "$BR"
          gh pr create \
            --title "dev: bump api/worker to ${GITHUB_SHA::12}" \
            --body "Image digests built by CI. Argo CD reconciles after merge." \
            --base main --head "$BR"
