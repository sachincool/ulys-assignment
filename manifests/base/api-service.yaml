# `api` is the stable Service the canary weighting subtracts from;
# `api-canary` is the canary preview Service the AnalysisTemplate hits.
# Argo Rollouts manages the endpoint label switching automatically.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ulys
spec:
  type: ClusterIP
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-canary
  namespace: ulys
spec:
  type: ClusterIP
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 8080
