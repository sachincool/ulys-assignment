# Google Secret Manager → CSI volume → synced K8s Secret.
# The api Pod consumes DB_PASSWORD via envFrom.secretKeyRef on the
# `api-secrets` Secret that this CSI mount populates. WI auth: the api
# KSA impersonates the api GSA which has roles/secretmanager.secretAccessor
# on db-app-password. provider:gke is the GKE Autopilot managed add-on
# (enabled via terraform's google_container_cluster.secret_manager_config).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-gsm
  namespace: ulys
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${PROJECT_ID}/secrets/db-app-password/versions/latest"
        path: "db-password"
  secretObjects:
    - secretName: api-secrets
      type: Opaque
      data:
        - objectName: db-password
          key: DB_PASSWORD
