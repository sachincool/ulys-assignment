# Google Secret Manager → CSI-mounted file (no K8s Secret round-trip).
# The api Pod reads DB_PASSWORD_FILE=/var/run/secrets/gsm/db-password.
# WI auth: the api KSA impersonates the api GSA which has
# roles/secretmanager.secretAccessor on db-app-password. provider:gke is
# the GKE Autopilot managed add-on (enabled via `gcloud clusters update
# --enable-secret-manager`).
#
# `secretObjects` (which would sync into a K8s Secret) is intentionally
# omitted: Autopilot does not grant the managed driver KSA cluster-wide
# `secrets.list/watch` (`User "system:serviceaccount:kube-system:secrets-
# store-csi-driver-gke" cannot list resource "secrets"`), so the sync
# never completes. File-mount is the cleaner pattern anyway — same as
# the Cloud Run / Vault Agent injection path.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: api-gsm
  namespace: ulys
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/${PROJECT_ID}/secrets/db-app-password/versions/latest"
        path: "db-password"
